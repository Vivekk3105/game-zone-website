<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game - GameZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/memory.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand text-gradient" href="../index.html">GAMEZONE</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="games.html" class="btn btn-outline-light btn-sm me-3">Back to Games</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5 text-center min-vh-100">
        <h2 class="text-gradient mb-4">Memory Card Game</h2>
        
        <div class="game-dashboard d-flex justify-content-center gap-4 mb-4 flex-wrap">
            <div class="stat-box">Time: <span id="timeDisplay">00:00</span></div>
            <div class="stat-box">Moves: <span id="moveCount">0</span></div>
            <div class="stat-box">Best (Moves): <span id="bestScore">--</span></div>
            <div class="controls d-flex align-items-center gap-2">
                <select id="difficultySelect" class="form-select bg-dark text-light border-secondary w-auto">
                    <option value="easy">Easy (4x3)</option>
                    <option value="medium" selected>Medium (4x4)</option>
                    <option value="hard">Hard (5x4)</option>
                </select>
                <button id="restartBtn" class="btn btn-neon btn-sm">Restart</button>
            </div>
        </div>

        <div class="memory-board-container position-relative mx-auto">
            <div id="memoryBoard" class="memory-board">
                <!-- Cards injected by JS -->
            </div>
            
            <!-- Win Overlay -->
            <div id="winOverlay" class="game-overlay d-none">
                <h3 class="text-success mb-3">You Won!</h3>
                <p>Time: <span id="finalTime">00:00</span></p>
                <p>Moves: <span id="finalMoves">0</span></p>
                <button id="playAgainBtn" class="btn btn-primary-custom mt-3">Play Again</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="../js/memory.js"></script>
</body>
</html>
