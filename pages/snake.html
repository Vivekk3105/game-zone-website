<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake - GameZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/snake.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand text-gradient" href="../index.html">GAMEZONE</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="games.html" class="btn btn-outline-light btn-sm me-3">Back to Games</a>
            </div>
        </div>
    </nav>

    <!-- Game Container -->
    <div class="container mt-5 pt-5 text-center min-vh-100 d-flex flex-column align-items-center justify-content-center">
        <h2 class="text-gradient mb-4">Retro Snake</h2>
        
        <div class="game-wrapper">
            <div class="game-header d-flex justify-content-between mb-2 w-100 px-2">
                <div class="score-board">Score: <span id="score">0</span></div>
                <div class="high-score-board">High Score: <span id="highScore">0</span></div>
                <div class="level-board">Level: <span id="level">1</span></div>
            </div>
            
            <div class="canvas-container position-relative">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                
                <!-- Overlay Menus -->
                <div id="startOverlay" class="game-overlay">
                    <h3>Snake Game</h3>
                    <p>Use Arrow Keys or Swipe to move.</p>
                    <button id="startBtn" class="btn btn-neon mt-3">Start Game</button>
                </div>
                <div id="pauseOverlay" class="game-overlay d-none">
                    <h3>Paused</h3>
                    <button id="resumeBtn" class="btn btn-neon mt-3">Resume</button>
                </div>
                <div id="gameOverOverlay" class="game-overlay d-none">
                    <h3 class="text-danger">Game Over!</h3>
                    <p>Final Score: <span id="finalScore">0</span></p>
                    <button id="restartBtn" class="btn btn-neon mt-3">Try Again</button>
                </div>
            </div>
            
            <div class="controls mt-3 mb-4">
                <button id="pauseGameBtn" class="btn btn-outline-secondary me-2">Pause</button>
            </div>

            <!-- Mobile Controls -->
            <div class="mobile-controls d-md-none mt-2">
                <div class="d-flex justify-content-center mb-2">
                    <button class="mobile-btn" id="btnUp">↑</button>
                </div>
                <div class="d-flex justify-content-center mb-2">
                    <button class="mobile-btn me-4" id="btnLeft">←</button>
                    <button class="mobile-btn ms-4" id="btnRight">→</button>
                </div>
                <div class="d-flex justify-content-center">
                    <button class="mobile-btn" id="btnDown">↓</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="../js/snake.js"></script>
</body>
</html>
