<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Clone - GameZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/flappy.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand text-gradient" href="../index.html"> GAMEZONE </a>
            <a href="games.html" class="btn btn-primary-custom btn-sm">← Back to Games</a>
        </div>
    </nav>

    <div class="container mt-5 pt-5 text-center min-vh-100 d-flex flex-column align-items-center justify-content-center">
        <h2 class="text-gradient mb-4">Flappy Clone</h2>
        
        <div class="game-wrapper">
            <div class="game-header d-flex justify-content-between mb-2 w-100 px-2">
                <div class="score-board">Score: <span id="score">0</span></div>
                <div class="high-score-board text-warning">Best: <span id="bestScore">0</span></div>
            </div>
            
            <div class="canvas-container position-relative">
                <canvas id="flappyCanvas" width="400" height="600"></canvas>
                
                <div id="startOverlay" class="game-overlay">
                    <h3>Flappy Clone</h3>
                    <p>Press SPACE or Tap to Jump.</p>
                    <button id="startBtn" class="btn btn-neon mt-3">Start Game</button>
                </div>
                
                <div id="gameOverOverlay" class="game-overlay d-none">
                    <h3 class="text-danger">Game Over!</h3>
                    <p>Score: <span id="finalScore">0</span></p>
                    <button id="restartBtn" class="btn btn-neon mt-3">Try Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/flappy.js"></script>
</body>
</html>
