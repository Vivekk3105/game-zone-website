<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - GameZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/game2048.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand text-gradient" href="../index.html"> GAMEZONE </a>
            <a href="games.html" class="btn btn-primary-custom btn-sm">← Back to Games</a>
        </div>
    </nav>


    <div class="container mt-5 pt-5 text-center min-vh-100">
        <h2 class="text-gradient mb-4">2048</h2>
        
        <div class="game-dashboard d-flex justify-content-center gap-4 mb-4 flex-wrap align-items-center">
            <div class="stat-box">Score: <span id="score">0</span></div>
            <div class="stat-box text-warning">Best: <span id="bestScore">0</span></div>
            <button id="restartBtn" class="btn btn-neon btn-sm">New Game</button>
        </div>

        <div class="game2048-container mx-auto position-relative">
            <div id="grid-container" class="grid-container">
                <!-- 16 grid cells -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            
            <div id="tile-container" class="tile-container">
                <!-- Tiles injected by JS -->
            </div>

            <div id="gameOverOverlay" class="game-overlay d-none">
                <h3 class="text-danger mb-3">Game Over!</h3>
                <button id="tryAgainBtn" class="btn btn-primary-custom">Try Again</button>
            </div>
            <div id="gameWinOverlay" class="game-overlay d-none">
                <h3 class="text-success mb-3">You Win! (2048)</h3>
                <button id="keepPlayingBtn" class="btn btn-outline-light mb-2">Keep Playing</button>
                <button id="playAgainBtn" class="btn btn-primary-custom">Play Again</button>
            </div>
        </div>
        <p class="text-muted mt-3">Use arrow keys or swipe to move tiles.</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/game2048.js"></script>
</body>
</html>
