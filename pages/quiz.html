<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - GameZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/quiz.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand text-gradient" href="../index.html">GAMEZONE</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="games.html" class="btn btn-outline-light btn-sm me-3">Back to Games</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5 min-vh-100 d-flex flex-column align-items-center justify-content-center">
        
        <div class="quiz-container mx-auto">
            <!-- Start Screen -->
            <div id="startScreen" class="text-center">
                <h2 class="text-gradient mb-4">Quiz Master</h2>
                <p class="text-muted mb-4">Test your knowledge across different categories! You have 15 seconds per question.</p>
                <div class="mb-4 text-start">
                    <label for="categorySelect" class="form-label">Select Category</label>
                    <select id="categorySelect" class="form-select bg-dark text-light border-secondary">
                        <option value="all">Mixed Topics (Random)</option>
                        <option value="gaming">Video Games</option>
                        <option value="tech">Technology & Computers</option>
                    </select>
                </div>
                <button id="startQuizBtn" class="btn btn-primary-custom btn-lg w-100">Start Quiz</button>
            </div>

            <!-- Quiz Screen -->
            <div id="quizScreen" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span id="questionCounter" class="badge bg-secondary">Question 1/10</span>
                    <span id="scoreDisplay" class="badge bg-primary">Score: 0</span>
                    <span class="badge bg-danger">Time: <span id="timeRemaining">15</span>s</span>
                </div>
                
                <div class="progress mb-4" style="height: 5px;">
                    <div id="progressBar" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
                </div>

                <h4 id="questionText" class="mb-4 lh-base text-white">Question text goes here?</h4>

                <div class="options-grid">
                    <button class="btn btn-outline-light option-btn" data-index="0">Option A</button>
                    <button class="btn btn-outline-light option-btn" data-index="1">Option B</button>
                    <button class="btn btn-outline-light option-btn" data-index="2">Option C</button>
                    <button class="btn btn-outline-light option-btn" data-index="3">Option D</button>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="resultScreen" class="d-none text-center">
                <h2 class="mb-3">Quiz Complete!</h2>
                <div class="mb-4">
                    <h1 class="text-gradient display-1 fw-bold" id="finalScore">0</h1>
                    <p class="text-muted">Out of 100 possible points</p>
                </div>
                <div class="d-flex justify-content-center gap-3">
                    <button id="restartBtn" class="btn btn-neon">Play Again</button>
                    <a href="leaderboard.html" class="btn btn-outline-light">Leaderboard</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="../js/quiz.js"></script>
</body>
</html>
